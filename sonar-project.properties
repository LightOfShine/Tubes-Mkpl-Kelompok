# Replace YOUR_GITHUB_USERNAME and YOUR_ORG_KEY with your actual SonarCloud org/project keys.
# You get these when you import the repo in https://sonarcloud.io
sonar.organization=YOUR_SONARCLOUD_ORG_KEY
sonar.projectKey=YOUR_SONARCLOUD_PROJECT_KEY

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=dist/**,coverage/**,node_modules/**
