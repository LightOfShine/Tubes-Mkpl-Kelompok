<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker - CI/CD Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Task Tracker - Final Demo</h1>
    <p class="subtitle">Demo aplikasi untuk Tugas Besar CI/CD</p>

    <form id="task-form">
      <input id="task-input" type="text" placeholder="Tambah tugas baru..." required />
      <button type="submit">Tambah</button>
    </form>

    <div class="filters">
      <button data-filter="all">Semua</button>
      <button data-filter="pending">Belum Selesai</button>
      <button data-filter="done">Selesai</button>
    </div>

    <table id="task-table">
      <thead>
        <tr>
          <th>No</th>
          <th>Status</th>
          <th>Nama Tugas</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="task-body"></tbody>
    </table>
    <p id="stats">0/0 done (0%)</p>
  </main>

  <script src="app.js"></script>
  <script src="ui.js"></script>
</body>
</html>
